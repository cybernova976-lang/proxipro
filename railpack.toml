[phases.setup]
cmds = [
  # Create a minimal .env so Laravel can boot during the build phase.
  # On Railway, the real environment variables are injected at runtime;
  # this file is only needed to satisfy artisan commands that run during build.
  "cp .env.example .env || true",
  # Ensure the SQLite file exists so package:discover (triggered by composer)
  # does not crash when DB_CONNECTION=sqlite is the build-time fallback.
  "mkdir -p database && touch database/database.sqlite",
]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction",
  "php artisan key:generate --force || true",
  # Skip migrations at build time to avoid running SQLite-specific migration
  # logic against the ephemeral SQLite build DB when the target is PostgreSQL.
  # Migrations will run at container start against the real PostgreSQL database.
  # "php artisan migrate --force || true",
  # Build frontend assets FIRST so the Vite manifest (public/build/.vite/manifest.json)
  # exists before any artisan caching commands that resolve @vite() directives.
  "npm ci",
  "npm run build",
  "php artisan route:cache || true",
  # view:cache runs after npm run build so @vite() directives resolve correctly
  # against the manifest that was just produced.
  "php artisan view:cache || true",
]

[start]
# At runtime Railway injects the real DB_* variables (PostgreSQL).
# Regenerate the Composer autoloader first to ensure anonymous migration classes
# (return new class ...) are resolved correctly and not cached from build time.
# Then run migrations against the live database before the server starts.
# config:cache and view:cache re-run here so they pick up the real APP_URL
# and any other runtime environment variables injected by Railway.
cmd = "composer dump-autoload --optimize && php artisan migrate --force && php artisan config:cache && php artisan view:cache && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}",