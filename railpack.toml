[phases.setup]
cmds = [
  # Create a minimal .env so Laravel can boot during the build phase.
  # On Railway, the real environment variables are injected at runtime;
  # this file is only needed to satisfy artisan commands that run during build.
  "[ ! -f .env ] && cp .env.example .env || true",
  # Ensure the SQLite file exists so package:discover (triggered by composer)
  # does not crash when DB_CONNECTION=sqlite is the build-time fallback.
  "mkdir -p database && touch database/database.sqlite",
]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction",
  "php artisan key:generate --force || true",
  # Skip migrations at build time — they run at startup against the real PostgreSQL DB.
  # Build frontend assets so the Vite manifest exists before any caching.
  "npm ci",
  "npm run build",
  "php artisan route:cache || true",
  # view:cache MUST NOT run at build time because APP_URL and DB_* are not set yet.
  # It will run at startup after config:cache has loaded the real environment.
]

[start]
# At runtime Railway injects the real DB_* variables (PostgreSQL).
# 1. Regenerate autoloader so anonymous-class migrations resolve correctly.
# 2. Create storage symlink (must run at runtime, not build time).
# 3. Run migrations against the live database.
# 4. Cache config (picks up real APP_URL, DB_*, SESSION_DRIVER, etc.).
# 5. Cache views AFTER config so @vite() and dynamic URLs are correct.
# 6. Start the server.
cmd = "bash -c '(sleep 2 && composer dump-autoload --optimize && php artisan storage:link --force || true && php artisan migrate --force && php artisan db:seed --class=AdminSeeder --force && php artisan config:cache && php artisan view:clear && php artisan view:cache) & php artisan serve --host=0.0.0.0 --port=${PORT:-8080}'"