services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      APP_NAME: ProxiPro
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: "http://localhost:${APP_PORT:-8080}"
      APP_KEY: "${APP_KEY}"
      APP_LOCALE: fr
      APP_FALLBACK_LOCALE: fr
      DB_CONNECTION: sqlite
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      LOG_CHANNEL: stderr
    volumes:
      - app-storage:/var/www/html/storage
      - app-db:/var/www/html/database

volumes:
  app-storage:
  app-db:
