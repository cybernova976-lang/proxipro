# -------------------------------------------------------
# Railway deployment configuration for ProxiPro
# https://docs.railway.app/reference/config-as-code
# -------------------------------------------------------

[build]
# Use Nixpacks (nixpacks.toml) for building

[deploy]
# Railway injects $PORT; nixpacks.toml start command honors it
healthcheckPath = "/health.php"
healthcheckTimeout = 600
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
numReplicas = 1
