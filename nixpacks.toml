[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo_pgsql", "php83Extensions.pdo_mysql", "php83Extensions.gd", "php83Extensions.bcmath", "php83Extensions.mbstring", "php83Extensions.xml", "php83Extensions.curl", "php83Extensions.zip", "php83Extensions.fileinfo", "php83Extensions.tokenizer", "nodejs_20", "npm"]

[phases.install]
cmds = [
    "mkdir -p storage/framework/{sessions,views,cache}",
    "mkdir -p storage/logs",
    "mkdir -p bootstrap/cache",
    "[ ! -f .env ] && cp .env.example .env || true",
    "mkdir -p database && touch database/database.sqlite",
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm ci"
]

[phases.build]
cmds = [
    "npm run build",
    "php artisan route:cache || true"
    # Do NOT run config:cache, view:cache or storage:link at build time.
    # Real env variables (DB_*, APP_URL, etc.) are only available at runtime on Railway.
]

[start]
cmd = "composer dump-autoload --optimize && php artisan storage:link --force || true && php artisan migrate --force && php artisan db:seed --class=AdminSeeder --force && php artisan config:cache && php artisan view:cache && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
