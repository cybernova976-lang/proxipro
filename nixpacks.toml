[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo_pgsql", "php83Extensions.pdo_mysql", "php83Extensions.gd", "php83Extensions.bcmath", "php83Extensions.mbstring", "php83Extensions.xml", "php83Extensions.curl", "php83Extensions.zip", "php83Extensions.fileinfo", "php83Extensions.tokenizer", "nodejs_20", "npm"]

[phases.install]
cmds = [
    "mkdir -p storage/framework/{sessions,views,cache}",
    "mkdir -p storage/logs",
    "mkdir -p bootstrap/cache",
    "[ ! -f .env ] && cp .env.example .env || true",
    "mkdir -p database && touch database/database.sqlite",
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm ci"
]

[phases.build]
cmds = [
    "npm run build",
    "php artisan route:cache || true"
    # Do NOT run config:cache, view:cache or storage:link at build time.
    # Real env variables (DB_*, APP_URL, etc.) are only available at runtime on Railway.
]

[start]
cmd = """
(grep -q '^APP_KEY=base64:' .env 2>/dev/null || [ -n \"$APP_KEY\" ] || php artisan key:generate --force --no-interaction) && \
composer dump-autoload --optimize --no-interaction && \
php artisan migrate --force --no-interaction && \
(php artisan db:seed --class=AdminSeeder --force --no-interaction || true) && \
php artisan config:cache --no-interaction && \
php artisan route:cache --no-interaction && \
php artisan view:clear --no-interaction && \
php artisan view:cache --no-interaction && \
(php artisan storage:link --force --no-interaction 2>/dev/null || true) && \
php artisan serve --host=0.0.0.0 --port=${PORT:-8080}
"""
